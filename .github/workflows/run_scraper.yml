name: Metal Scraper

on:
  schedule:
    - cron: '20 5 * * *'   # 00:20 Colombia
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          echo "Installing Python dependencies..."
          pip install selenium pandas lxml openpyxl xlsxwriter beautifulsoup4 undetected-chromedriver

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Show Chrome version
        run: google-chrome --version

      - name: Run scraper with retry
        env:
          METAL_USER: ${{ secrets.METAL_USER }}
          METAL_PASS: ${{ secrets.METAL_PASS }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: |

          echo "Starting scraper..."

          ATTEMPT=1
          MAX_ATTEMPTS=3

          until [ $ATTEMPT -gt $MAX_ATTEMPTS ]
          do

            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS"

            python scraper.py && break

            echo "Scraper failed..."

            ATTEMPT=$((ATTEMPT+1))

            if [ $ATTEMPT -le $MAX_ATTEMPTS ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi

          done

          if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
            echo "Scraper failed after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Success log
        run: echo "Scraper completed successfully"
