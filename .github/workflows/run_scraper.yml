name: run-scraper

on:
  schedule:
    - cron: '20 5 * * *'   # 00:20 Colombia (UTC-5)
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install requests pandas beautifulsoup4 gspread oauth2client

    - name: Run scraper with retry
      run: |
        echo "Starting scraper..."

        for i in {1..3}
        do
          echo "Attempt $i..."

          python scraper.py && break

          echo "Attempt $i failed. Waiting 60 seconds..."
          sleep 60
        done

    - name: Finished
      run: echo "Workflow finished successfully"
